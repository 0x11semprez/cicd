name: CI EXERCICE
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
permissions:
  contents: read
  pull-requests: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
  test:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/setup-node@v4
