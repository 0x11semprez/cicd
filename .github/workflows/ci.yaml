name: ci exercice
on:
  push:
    branches: [main, dev]
  paths:
    - "backend/**"
    - "shared/**"
  pull_request:
    branches: [dev, main]
  schedule:
    - cron: "0 2 * * *"
permissions:
  contents: read
  pull-requests: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io


